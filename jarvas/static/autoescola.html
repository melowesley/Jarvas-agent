<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoescola Jarvas — Aprenda a dirigir</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --text-light: #f1f5f9;
            --text-muted: #cbd5e1;
            --border: #334155;
            --code-bg: #1e293b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Monaco', 'Courier New', monospace;
            background: var(--bg-darker);
            color: var(--text-light);
            height: 100vh;
            overflow: hidden;
        }

        .autoescola-wrapper {
            display: flex;
            height: 100%;
            gap: 0;
        }

        /* LEFT PANEL — Instruções */
        .left-panel {
            flex: 0 0 45%;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2744 100%);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .lesson-header {
            padding: 20px;
            border-bottom: 2px solid var(--border);
            background: rgba(99, 102, 241, 0.1);
        }

        .lesson-header h2 {
            color: var(--primary);
            font-size: 1.5em;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.3s ease;
        }

        .lesson-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .lesson-content section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .lesson-content section:last-child {
            border-bottom: none;
        }

        .scenario {
            background: rgba(139, 92, 246, 0.1);
            border-left: 4px solid var(--secondary);
            padding: 15px;
            border-radius: 4px;
        }

        .scenario p {
            color: var(--text-light);
            line-height: 1.6;
            font-style: italic;
        }

        .steps {
            background: rgba(99, 102, 241, 0.05);
            padding: 15px;
            border-radius: 4px;
        }

        .steps h4 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 0.95em;
        }

        .step-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(31, 41, 55, 0.5);
            border-radius: 3px;
            align-items: flex-start;
        }

        .step-item.completed {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid var(--success);
        }

        .step-number {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 0.8em;
            font-weight: bold;
            flex-shrink: 0;
        }

        .step-item.completed .step-number {
            background: var(--success);
        }

        .step-text {
            flex: 1;
            font-size: 0.9em;
            color: var(--text-muted);
        }

        .diagram {
            background: rgba(20, 30, 48, 0.8);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--text-muted);
            overflow-x: auto;
        }

        .diagram pre {
            margin: 0;
            color: var(--primary);
        }

        .checkpoint, .warning {
            padding: 12px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.9em;
        }

        .checkpoint {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid var(--success);
            color: #86efac;
        }

        .warning {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--danger);
            color: #fca5a5;
        }

        /* RIGHT PANEL — Chat */
        .right-panel {
            flex: 0 0 55%;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(99, 102, 241, 0.05);
        }

        .chat-header h3 {
            color: var(--primary);
            font-size: 1em;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 14px;
            border-radius: 6px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--primary);
            color: white;
        }

        .message.system .message-content {
            background: var(--code-bg);
            border-left: 3px solid var(--primary);
            color: var(--text-light);
        }

        .message.error .message-content {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--danger);
            color: #fca5a5;
        }

        .message.success .message-content {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid var(--success);
            color: #86efac;
        }

        .chat-input-container {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            background: rgba(31, 41, 55, 0.5);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: var(--code-bg);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 10px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95em;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .btn-send {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-send:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        /* Lessons selector */
        .lessons-nav {
            padding: 15px 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: rgba(31, 41, 55, 0.3);
            border-bottom: 1px solid var(--border);
            max-height: 140px;
            overflow-y: auto;
        }

        .lesson-btn {
            background: var(--code-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.8em;
            text-align: left;
            transition: all 0.2s ease;
        }

        .lesson-btn:hover {
            border-color: var(--primary);
            color: var(--text-light);
        }

        .lesson-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
        }

        .modal-content.success {
            border-color: var(--success);
        }

        .modal-content.error {
            border-color: var(--danger);
        }

        .modal-content h3 {
            font-size: 1.3em;
            margin-bottom: 15px;
        }

        .modal-content p {
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .modal-btn {
            background: var(--primary);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-btn:hover {
            background: var(--secondary);
        }
    </style>
</head>
<body>
    <div class="autoescola-wrapper">
        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="lessons-nav" id="lessonsNav">
                <!-- Populated by JavaScript -->
            </div>

            <div class="lesson-header">
                <h2 id="lessonTitle">Aula 1: Primeira Marcha</h2>
                <div class="progress-bar">
                    <div class="progress-bar-fill" id="progressBarFill" style="width: 0%;"></div>
                </div>
            </div>

            <div class="lesson-content" id="lessonContent">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <div class="chat-header">
                <h3 id="chatTitle">Chat da Aula</h3>
                <p id="chatHint">Digite seu comando aqui...</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    <div class="message-content">
                        Bem-vindo à Autoescola Jarvas! 🚗<br>
                        Siga os passos à esquerda para aprender a "dirigir" o Jarvas.
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <input
                    type="text"
                    class="chat-input"
                    id="chatInput"
                    placeholder="Digite seu comando ou pergunta..."
                    autocomplete="off"
                >
                <button class="btn-send" id="btnSend">Enviar</button>
            </div>
        </div>
    </div>

    <!-- Modal para feedback -->
    <div class="modal" id="feedbackModal">
        <div class="modal-content" id="feedbackContent">
            <h3 id="feedbackTitle">Parabéns!</h3>
            <p id="feedbackMessage">Passo completo!</p>
            <button class="modal-btn" onclick="document.getElementById('feedbackModal').classList.remove('show');">
                Continuar
            </button>
        </div>
    </div>

    <script>
        // DADOS DAS AULAS (importado do backend)
        const LESSONS = [];

        // ENGINE DA AUTOESCOLA
        class AutoescolaEngine {
            constructor() {
                this.currentLessonIdx = 0;
                this.currentStepIdx = 0;
                this.completedSteps = new Set();
                this.init();
            }

            async init() {
                // Carregar dados das aulas do backend
                try {
                    const res = await fetch('/v1/autoescola/lessons');
                    const data = await res.json();
                    LESSONS.push(...data.lessons);
                    this.render();
                } catch (err) {
                    console.error('Erro ao carregar aulas:', err);
                    this.addSystemMessage('Erro ao carregar aulas. Tente recarregar a página.');
                }
            }

            currentLesson() {
                return LESSONS[this.currentLessonIdx];
            }

            currentStep() {
                const lesson = this.currentLesson();
                return lesson.steps[this.currentStepIdx];
            }

            render() {
                this.renderLessonsNav();
                this.renderLessonContent();
                this.updateProgressBar();
                this.updateChatHeader();
            }

            renderLessonsNav() {
                const nav = document.getElementById('lessonsNav');
                nav.innerHTML = '';
                LESSONS.forEach((lesson, idx) => {
                    const btn = document.createElement('button');
                    btn.className = `lesson-btn ${idx === this.currentLessonIdx ? 'active' : ''}`;
                    btn.textContent = `Aula ${lesson.id}: ${lesson.name}`;
                    btn.onclick = () => this.goToLesson(idx);
                    nav.appendChild(btn);
                });
            }

            renderLessonContent() {
                const lesson = this.currentLesson();
                const content = document.getElementById('lessonContent');
                const title = document.getElementById('lessonTitle');

                title.textContent = `Aula ${lesson.id}: ${lesson.name}`;

                content.innerHTML = `
                    <section class="scenario">
                        <p>${lesson.scenario}</p>
                    </section>

                    <section class="steps">
                        <h4>📋 Passos:</h4>
                        ${lesson.steps.map((step, idx) => `
                            <div class="step-item ${this.completedSteps.has(`${this.currentLessonIdx}-${idx}`) ? 'completed' : ''}">
                                <div class="step-number">${this.completedSteps.has(`${this.currentLessonIdx}-${idx}`) ? '✓' : idx + 1}</div>
                                <div class="step-text">
                                    <strong>${step.instruction}</strong><br>
                                    <small style="color: var(--text-muted);">Esperado: ${step.expectedOutput}</small>
                                </div>
                            </div>
                        `).join('')}
                    </section>

                    <section class="diagram">
                        <pre>${lesson.diagram || 'Diagrama indisponível'}</pre>
                    </section>

                    ${this.currentStep().checkpoint ? `
                        <section class="checkpoint">
                            <strong>✓ Checkpoint:</strong> ${this.currentStep().checkpoint}
                        </section>
                    ` : ''}

                    ${this.currentStep().warning ? `
                        <section class="warning">
                            <strong>⚠️ Cuidado:</strong> ${this.currentStep().warning}
                        </section>
                    ` : ''}
                `;
            }

            updateProgressBar() {
                const lesson = this.currentLesson();
                const total = lesson.steps.length;
                const completed = lesson.steps.filter((_, idx) =>
                    this.completedSteps.has(`${this.currentLessonIdx}-${idx}`)
                ).length;
                const percent = Math.round((completed / total) * 100);
                document.getElementById('progressBarFill').style.width = percent + '%';
            }

            updateChatHeader() {
                const lesson = this.currentLesson();
                const step = this.currentStep();
                document.getElementById('chatTitle').textContent = `Passo ${this.currentStepIdx + 1}/${lesson.steps.length}`;
                document.getElementById('chatHint').textContent = step.hint || 'Digite seu comando...';
            }

            async validateStep(userCommand, response) {
                const step = this.currentStep();
                const isValid = this.checkCommand(userCommand, step);

                if (isValid) {
                    this.markStepComplete();
                    this.showFeedback('success', '✓ Passo completo!', 'Você está no caminho certo.');
                    return true;
                } else {
                    this.showFeedback('error', '✗ Comando inválido', step.hint);
                    return false;
                }
            }

            checkCommand(userCommand, step) {
                // Simples regex matching (melhorado no backend)
                const regex = new RegExp(step.expectedRegex, 'i');
                return regex.test(userCommand);
            }

            markStepComplete() {
                const stepKey = `${this.currentLessonIdx}-${this.currentStepIdx}`;
                this.completedSteps.add(stepKey);
                this.saveProgress();

                // Avançar para próximo passo
                setTimeout(() => {
                    if (this.currentStepIdx < this.currentLesson().steps.length - 1) {
                        this.currentStepIdx++;
                    } else if (this.currentLessonIdx < LESSONS.length - 1) {
                        this.currentLessonIdx++;
                        this.currentStepIdx = 0;
                    }
                    this.render();
                }, 1500);
            }

            goToLesson(idx) {
                this.currentLessonIdx = idx;
                this.currentStepIdx = 0;
                this.render();
            }

            async saveProgress() {
                const data = {
                    lesson: this.currentLessonIdx,
                    step: this.currentStepIdx,
                    validated: Array.from(this.completedSteps)
                };
                try {
                    await fetch('/v1/autoescola/progress', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } catch (err) {
                    console.error('Erro ao salvar progresso:', err);
                }
            }

            addSystemMessage(text) {
                const container = document.getElementById('chatMessages');
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message system';
                msgDiv.innerHTML = `<div class="message-content">${text}</div>`;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            }

            addUserMessage(text) {
                const container = document.getElementById('chatMessages');
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message user';
                msgDiv.innerHTML = `<div class="message-content">${text}</div>`;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            }

            showFeedback(type, title, message) {
                const modal = document.getElementById('feedbackModal');
                const content = document.getElementById('feedbackContent');
                const titleEl = document.getElementById('feedbackTitle');
                const messageEl = document.getElementById('feedbackMessage');

                content.className = `modal-content ${type}`;
                titleEl.textContent = title;
                messageEl.textContent = message;
                modal.classList.add('show');
            }
        }

        // Inicializar
        const engine = new AutoescolaEngine();

        // Chat event listeners
        document.getElementById('btnSend').addEventListener('click', handleSend);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        async function handleSend() {
            const input = document.getElementById('chatInput');
            const command = input.value.trim();

            if (!command) return;

            engine.addUserMessage(command);
            input.value = '';

            // Executar comando no backend
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensagem: command })
                });
                const data = await res.json();
                engine.addSystemMessage(data.resposta || 'Sem resposta');

                // Validar passo
                engine.validateStep(command, data.resposta);
            } catch (err) {
                engine.addSystemMessage(`Erro: ${err.message}`);
            }
        }
    </script>
</body>
</html>
